<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility AI | CODM Tactical Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="waitlist-section">
        <h1>Utility AI</h1>
        <p>Level up your CODM gameplay. Get god-tier loadouts and professional tactics.</p>
        <form action="https://formspree.io/f/mvzvovke" method="POST">
            <input type="email" name="email" placeholder="Enter your email address" required>
            <button type="submit">Join</button>
        </form>
    </div>

    <div id="app-layout" style="display: none;">
        
        <nav class="sidebar" id="mobile-sidebar">
            <h2>Utility AI</h2>
            <button id="new-chat-btn">+ New Intel</button>
            <div class="history-label">Recent Operations</div>
            <ul id="history-list">
                <li class="history-item">Ghost Placeholder 1</li>
                <li class="history-item">Ghost Placeholder 2</li>
            </ul>
        </nav>

        <div id="sidebar-overlay"></div>

        <main class="chat-main">
            <header class="chat-header">
                <button id="mobile-menu-btn" title="Menu">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z" /></svg>
                </button>
                
                <div class="intensity-control">
                    <label for="intensity">Detail:</label>
                    <input type="range" id="intensity" min="1" max="3" value="2">
                    <span id="intensity-label">Normal</span>
                </div>
                
                <button id="share-chat-btn" title="Share Intel">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M21,11L14,4V8C7,9 4,14 3,19C5.5,15.5 9,13.9 14,13.9V18L21,11Z" /></svg>
                </button>
            </header>

            <div id="ai-output">
                <div class="msg-bubble msg-ai">> System Online. Awaiting tactical inquiry...</div>
            </div>

            <div class="input-wrapper">
                <button id="attach-btn" title="Upload Image (Coming Soon)">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg>
                </button>
                <input type="text" id="ai-input" placeholder="Ask for a loadout or tactic...">
                <button id="ai-send" title="Send">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
                </button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
