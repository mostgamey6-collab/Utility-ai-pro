<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility AI | CODM Tactical Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-layout">
        <nav class="sidebar" id="mobile-sidebar">
            <h2>Utility AI</h2>
            <button id="new-chat-btn">+ New Chat</button>
            <div class="history-label">Recent Operations</div>
            <ul id="history-list"></ul>
            
            <button id="clear-history-btn" style="margin-top: auto; background: transparent; border: 1px solid var(--border-color); color: var(--text-color); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">🗑️ Clear History</button>
        </nav>

        <div id="sidebar-overlay"></div>

        <main class="chat-main">
            <header class="chat-header">
                <button id="mobile-menu-btn" title="Menu">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z" /></svg>
                </button>
                
                <div class="intensity-control">
                    <label for="intensity">Detail:</label>
                    <input type="range" id="intensity" min="0" max="100" value="50" step="1">
                    <span id="intensity-label">50% (Normal)</span>
                </div>
                
                <button id="share-chat-btn" title="Share Intel">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M21,11L14,4V8C7,9 4,14 3,19C5.5,15.5 9,13.9 14,13.9V18L21,11Z" /></svg>
                </button>
            </header>

            <div id="ai-output">
                <div class="msg-bubble msg-ai">⚡ Utility AI Online. Ready for loadouts, tactics, or CODM intel.</div>
            </div>

            <div class="input-wrapper">
                <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp" style="display: none;">
                
                <button id="attach-btn" title="Attach Screenshot">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg>
                </button>
                <input type="text" id="ai-input" placeholder="Ask anything about CODM...">
                <button id="ai-send" title="Send">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
                </button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
